name: Robot Framework Tests

on:
  push:
    branches: [ challenge04-genai, main ]
  pull_request:
    branches: [ challenge04-genai, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Executar testes Robot Framework
      run: |
        robot --outputdir results --name "ServeRest API Tests" tests/
      continue-on-error: true
    
    - name: Upload dos relatórios
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: robot-reports
        path: |
          results/log.html
          results/report.html
          results/output.xml
        retention-days: 30
    
    - name: Publicar resumo dos testes
      if: always()
      run: |
        echo "## 📊 Resultados dos Testes Robot Framework" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Os relatórios completos estão disponíveis nos artefatos desta execução." >> $GITHUB_STEP_SUMMARY
